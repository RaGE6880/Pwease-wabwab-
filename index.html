<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hangout Proposal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 80px;
      background-color: #f5f5f5;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      display: none;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    .yes {
      background-color: #4CAF50;
      color: white;
    }

    .no {
      background-color: #f44336;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 id="question">Will you hang out with me?</h1>

    <img id="cat" src="">

    <div>
      <button class="yes" onclick="sayYes()">Yes</button>
      <button class="no" onclick="sayNo()">No</button>
    </div>
  </div>

  <script>
    let noCount = 0;

    let questions = [
      "Are you sure?",
      "Really sure?",
      "Think again...",
      "Are you absolutely sure?",
      "You might regret this...",
      "This is your last chance...",
      "Are you really really sure?",
      "Why would you say no? 🤨",
      "Did you click the wrong button?",
      "Maybe give it another thought?",
      "Are you 100% certain?",
      "What if this is actually fun?",
      "You’re not even a little curious?",
      "Come on… just one hangout?",
      "Still no? 😿",
      "You’re breaking my heart here...",
      "Final answer?",
      "No take-backs after this...",
      "Are you REALLY sure this time?",
      "Alright… last chance… are you sure?"
    ];

    let catImages = [
      "images/cat1.gif",
      "images/cat2.jpg",
      "images/cat3.jpg",
      "images/cat4.jpg",
      "images/cat5.jpg",
    ];

    let yesCatImages = [
      "images/happycat.gif",
    ];

    function sayYes() {
      document.getElementById("question").innerText = "Yay! See you soon! 🎉";
      document.getElementById("cat").style.display = "none";
    }

    function sayNo() {
      noCount++;

      let cat = document.getElementById("cat");
      let question = document.getElementById("question");

      cat.style.display = "block";
      cat.src = catImages[noCount % catImages.length];

      // Progress through questions, then stay at last
      question.innerText = questions[Math.min(noCount, questions.length - 1)];
    }    
  </script>

</body>
</html>
